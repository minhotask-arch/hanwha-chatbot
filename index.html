<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한화생명 보험 상담 챗봇</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="layout">
    <!-- 사이드바: 상품 목록 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>판매 상품</h2>
        <button class="sidebar-close" id="sidebarClose" aria-label="닫기">&times;</button>
      </div>
      <div class="sidebar-list" id="sidebarList">
        <!-- JS에서 상품 카드 렌더링 -->
      </div>
    </aside>

    <!-- 사이드바 열기 버튼 (모바일) -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="상품 목록 열기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

  <div id="app">
    <!-- 헤더 -->
    <header class="chat-header">
      <div class="header-logo">
        <div class="logo-icon">H</div>
        <div class="header-text">
          <h1 id="headerTitle">한화생명 보험 상담</h1>
          <span class="status-dot"></span>
          <span class="status-text">온라인</span>
        </div>
      </div>
    </header>

    <!-- 모드 탭 -->
    <nav class="mode-tabs">
      <button class="mode-tab active" data-mode="customer">
        <span class="tab-icon">💬</span> 고객 상담
      </button>
      <button class="mode-tab" data-mode="internal">
        <span class="tab-icon">🏢</span> 사내 업무
      </button>
    </nav>

    <!-- 채팅 영역 -->
    <main class="chat-body" id="chatBody">
      <!-- 메시지들이 여기에 추가됨 -->
    </main>

    <!-- 퀵 액션 -->
    <div class="quick-actions" id="quickActions">
      <button class="quick-btn" data-action="products">📋 전체 상품 보기</button>
      <button class="quick-btn" data-action="recommend">🎯 맞춤 추천</button>
      <button class="quick-btn" data-action="compare">⚖️ 상품 비교</button>
      <button class="quick-btn" data-action="faq">❓ 자주 묻는 질문</button>
    </div>

    <!-- 입력 영역 -->
    <footer class="chat-input-area">
      <div class="input-wrapper">
        <input
          type="text"
          id="userInput"
          placeholder="궁금한 보험 상품이나 질문을 입력하세요..."
          autocomplete="off"
        >
        <button id="sendBtn" class="send-btn" aria-label="전송">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  </div><!-- /layout -->
  <script src="app.js"></script>
</body>
</html>
